name: Docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: RFC quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        shell: bash
        run: >-
          rustup toolchain install 1.97.0
          --profile minimal
          --component rustfmt
          --component clippy

      - name: Check required RFC draft
        shell: bash
        run: |
          set -euo pipefail

          test -s drafts/agent-surface.md
          grep -q '^# Agent Surface Protocol Specification' drafts/agent-surface.md

      - name: Install review dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --requirement review/requirements.txt

      - name: Check conformance catalog
        timeout-minutes: 15
        shell: bash
        run: make conformance-check

      - name: Check mock bundle
        timeout-minutes: 5
        shell: bash
        run: make mock-check

      - name: Check ASP Manifest Linter
        timeout-minutes: 8
        shell: bash
        run: make manifest-lint-check

      - name: Check RFC review data
        timeout-minutes: 5
        shell: bash
        run: make review-data-check

      - name: Check RFC review tests
        timeout-minutes: 5
        shell: bash
        run: make review-test

      - name: Check dashboard artifact and UI state
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail
          make review-js-test
          python -B review/build_review.py --check
          node review/check_review.mjs

      - name: Check repository whitespace
        shell: bash
        run: |
          set -euo pipefail
          empty_tree="$(git hash-object -t tree /dev/null)"
          git diff --check "${empty_tree}" HEAD

      - name: Check Markdown hygiene
        shell: bash
        run: |
          set -euo pipefail

          files_found=0
          failed=0
          while IFS= read -r file; do
            files_found=1

            if grep -n $'\r' "${file}"; then
              echo "::error file=${file}::CRLF line endings are not allowed"
              failed=1
            fi

            if grep -n '[[:blank:]]$' "${file}"; then
              echo "::error file=${file}::Trailing whitespace is not allowed"
              failed=1
            fi

            if [[ -s "${file}" && -n "$(tail -c 1 "${file}")" ]]; then
              echo "::error file=${file}::File must end with a newline"
              failed=1
            fi
          done < <(git ls-files '*.md')

          if [[ "${files_found}" -eq 0 ]]; then
            echo "No Markdown files found." >&2
            exit 1
          fi

          exit "${failed}"

  markdown-links:
    name: Markdown links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,204,206,301,302,303,307,308,429
            --timeout 20
            --max-retries 5
            --retry-wait-time 2
            --max-concurrency 4
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
